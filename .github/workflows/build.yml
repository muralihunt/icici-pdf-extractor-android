name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # libtool-bin is the critical fix for the LT_SYS_SYMBOL_USCORE error
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool libtool-bin m4 cmake \
            pkg-config zlib1g-dev libncurses5-dev \
            libgdbm-dev libnss3-dev libssl-dev \
            libreadline-dev libffi-dev libsqlite3-dev \
            sqlite3 bzip2 libbz2-dev
          
          pip3 install --upgrade pip
          pip3 install buildozer cython virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 'yes |' handles the Android SDK license prompts automatically
          yes | buildozer -v android debug 2>&1 | tee build_log.txt
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ICICI-Searcher-APK
          path: bin/*.apk

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-report
          path: build_log.txt
