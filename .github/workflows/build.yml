name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Removed libmql-dev and added all necessary build tools
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev
          pip3 install --upgrade pip
          pip3 install buildozer cython virtualenv

      - name: Build APK
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # 'yes' automatically accepts the Android SDK licenses
          yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ICICI-Extractor-APK
          path: bin/*.apk
